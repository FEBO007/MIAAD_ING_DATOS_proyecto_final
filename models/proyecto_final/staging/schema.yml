version: 2

models:
  - name: stg_nyt_hardcover_fiction
    tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["published_date", "rank"]
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 15
            max_value: 5000
    columns:
      - name: published_date
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null
      - name: rank
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 15

  - name: stg_google_books_volumes
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 15
            max_value: 3000
    columns:
      - name: isbn13_clean
        tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[0-9]{13}$"
          - dbt_expectations.expect_column_values_to_not_be_null
      - name: gbooks_id
        tests:
          - dbt_expectations.expect_column_values_to_not_be_null

  - name: stg_wiki_pageviews_by_article
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1500
            max_value: 200000
    columns:
      - name: views
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: granularity
        tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set: ["daily"]
